services:
  postgres:
    image: postgres:16
    container_name: thai-swedish-dict-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: thai_swedish_dictionary
    ports:
      - "5433:5432"
    volumes:
      - pg_dict_data:/var/lib/postgresql/data

volumes:
  pg_dict_data:
