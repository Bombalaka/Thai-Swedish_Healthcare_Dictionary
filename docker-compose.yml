services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: thai-swedish-dict-api
    environment:
      - ConnectionStrings__DefaultConnection=${ConnectionStrings__DefaultConnection}
      - ASPNETCORE_ENVIRONMENT=Production
    ports:
      - "10000:10000"
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: thai-swedish-dict-web
    environment:
      - NEXT_PUBLIC_API_URL=http://${SERVER_IP:-localhost}:10000
      - BACKEND_URL=http://backend:10000
    ports:
      - "80:3000"
    restart: always
    depends_on:
      - backend
